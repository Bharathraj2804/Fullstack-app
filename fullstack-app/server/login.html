<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#f0f2f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box {
      background:white;
      padding:30px;
      border-radius:12px;
      width:300px;
      text-align:center;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width:90%;
      padding:10px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:6px;
    }

    button {
      width:100%;
      padding:10px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    button:hover {
      background:#0056b3;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:5000/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.text();

  if (data === "Login successful") {
    window.location.href = "home.html";  // ✅ direct redirect
  } else {
    alert(data); // show only errors
  }
}
</script>

</body>
</html>
